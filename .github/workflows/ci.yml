name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GMP build deps
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev m4
      - name: Build all targets
        run: cargo build --release
      - name: Run tests
        run: cargo test --release
      - name: Smoke test goldbach binary
        run: cargo run --release --bin goldbach -- 12345678901234567890
      - name: Smoke test extreme binary
        run: cargo run --release --bin extreme -- primorial 10
      - name: Smoke test bench binary
        run: cargo run --release --bin bench
